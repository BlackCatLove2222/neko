name: Build X Magisk Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with ReVanced CLI
        run: |
          # 1. ghコマンドで確実にバイナリをダウンロード
          # CLIとPatchesをリポジトリ名から自動取得
          gh release download --repo ReVanced/revanced-cli --pattern "revanced-cli-all.jar"
          gh release download --repo ReVanced/revanced-patches --pattern "*.rvp"
          
          # 2. APKのダウンロード（あなたのReleaseから）
          curl -L -o app.apkm "https://github.com/BlackCatLove2222/sample/releases/download/apkm/app.apkm"
          
          # 3. 実行前のファイルチェック（ここで壊れていないか確実に判定）
          echo "Checking file sizes..."
          ls -lh *.jar *.rvp *.apkm
          
          # 4. パッチ適用
          unzip -o app.apkm -d temp_apk
          java -jar revanced-cli-all.jar -a "$(find temp_apk -name "*.apk" | head -n 1)" -o patched.apk -b *.rvp --exclusive
          
          # 5. モジュール作成
          mkdir -p final_module/system/app/Twitter
          cp patched.apk final_module/system/app/Twitter/Twitter.apk
          echo "id=x_revanced_patched" > final_module/module.prop
          echo "name=X Patched (ReVanced)" >> final_module/module.prop
          echo "version=11.72.0" >> final_module/module.prop
          echo "author=GeminiUser" >> final_module/module.prop
          cd final_module && zip -r ../X-Patched-Module.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: Final-Magisk-Module
          path: X-Patched-Module.zip

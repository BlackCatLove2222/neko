name: Build X Magisk Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with ReVanced CLI
        run: |
          # 1. Clone and build ReVanced CLI (using inotia00 fork for compatibility)
          git clone https://github.com/inotia00/revanced-cli.git
          cd revanced-cli
          ./gradlew build
          cd ..
          CLI_JAR=$(find revanced-cli -name "revanced-cli-*-all.jar" | head -n 1)
          if [ -z "$CLI_JAR" ]; then
            echo "Error: revanced-cli.jar not built."
            exit 1
          fi

          # 2. Clone and build piko patches (crimera/piko for Twitter/X)
          git clone https://github.com/crimera/piko.git
          cd piko
          ./gradlew build
          cd ..
          PATCHES_JAR=$(find piko -name "piko-*-jar-with-dependencies.jar" | head -n 1)
          if [ -z "$PATCHES_JAR" ]; then
            echo "Error: piko patches.jar not built."
            exit 1
          fi

          # 3. Clone and build ReVanced Integrations (crimera fork)
          git clone https://github.com/crimera/revanced-integrations.git
          cd revanced-integrations
          ./gradlew assembleRelease
          cd ..
          INTEGRATIONS_APK=$(find revanced-integrations -name "revanced-integrations-*.apk" | head -n 1)
          if [ -z "$INTEGRATIONS_APK" ]; then
            echo "Error: integrations.apk not built."
            exit 1
          fi

          # 4. APKの特定と解凍
          APK_FILE=$(ls *.apkm | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "Error: *.apkm が見つかりません。"
            exit 1
          fi

          unzip -o "$APK_FILE" -d temp_apk
          BASE_APK=$(find temp_apk -type f -name "base.apk" | head -n 1)
          if [ -z "$BASE_APK" ]; then
            echo "Error: base.apk が見つかりません。"
            exit 1
          fi

          # 5. パッチ適用
          java -jar "$CLI_JAR" patch \
            --bundle="$PATCHES_JAR" \
            --merge="$INTEGRATIONS_APK" \
            --out=patched.apk \
            --force \
            "$BASE_APK"

          # 6. Magiskモジュール構成の作成
          mkdir -p final_module/system/app/Twitter
          mv patched.apk final_module/system/app/Twitter/Twitter.apk
          echo "id=x_revanced_patched" > final_module/module.prop
          echo "name=X Patched (ReVanced)" >> final_module/module.prop
          echo "version=11.72.0" >> final_module/module.prop
          echo "author=GeminiUser" >> final_module/module.prop

          # 7. ZIP圧縮
          cd final_module && zip -r ../X-Patched-Module.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: Final-Magisk-Module
          path: X-Patched-Module.zip

name: Build X Magisk Module

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Get ReVanced Tools
        run: |
          # 必要なツール（CLIとPatches）をダウンロード
          wget https://github.com/ReVanced/revanced-cli/releases/latest/download/revanced-cli.jar -O revanced-cli.jar
          # 統合パッチ（GmsCore用など）も一応取得
          wget https://github.com/ReVanced/revanced-patches/releases/latest/download/patches.jar -O official-patches.jar

      - name: Download X (Twitter) APK
        run: |
          # APKを外部から取得するスクリプト（簡易版）
          # 本来は特定のURLが必要ですが、まずはファイルをチェックします
          echo "Checking for patches-2.0.0.rvp..."
          ls -l patches-2.0.0.rvp

      - name: Build Module
        run: |
          # ここに実際のビルドコマンドを書きますが、
          # 初心者の方が一番確実に成功するのは j-hc 氏のテンプレートを流用することです。
          echo "ビルド環境を構築中..."
          # 一旦ダミーのZIPを作成して動作確認をします
          zip -r X-Patched-Module.zip config.json patches-2.0.0.rvp README.md

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: X-Magisk-Module-Debug
          path: X-Patched-Module.zip

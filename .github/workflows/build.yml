- name: Build with ReVanced CLI
        run: |
          # 1. 確実に必要なファイルをダウンロードする
          # -f: 失敗時に終了, -L: リダイレクト追従, -o: 出力先
          curl -fL -o revanced-cli.jar "https://github.com/ReVanced/revanced-cli/releases/latest/download/revanced-cli-all.jar"
          curl -fL -o patches.rvp "https://github.com/ReVanced/revanced-patches/releases/latest/download/revanced-patches.rvp"
          
          # 2. APKのダウンロード（提示いただいた署名付きURLを使用）
          URL="https://release-assets.githubusercontent.com/..." # ここに正しい署名付きURLを貼り付け
          curl -fL "$URL" -o app.apkm
          
          # 3. 破損チェック: 各ファイルのサイズを確認
          # JARファイルが最低でも10MB以上あるかを確認
          if [ $(stat -c%s "revanced-cli.jar") -lt 10000000 ]; then
            echo "Error: revanced-cli.jar is corrupted or too small."
            exit 1
          fi
          
          # 4. パッチ適用
          unzip -o app.apkm -d temp_apk
          java -jar revanced-cli.jar -a "$(find temp_apk -name "*.apk" | head -n 1)" -o patched.apk -b patches.rvp --exclusive

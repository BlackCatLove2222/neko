name: Build X Magisk Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with ReVanced CLI
        run: |
          # 1. ツール取得時に --retry 3 を追加して安定させる
          curl -L --retry 3 -o revanced-cli.jar "https://github.com/ReVanced/revanced-cli/releases/latest/download/revanced-cli-all.jar"
          curl -L --retry 3 -o patches.rvp "https://github.com/ReVanced/revanced-patches/releases/latest/download/revanced-patches.rvp"
          
          # 2. APKのダウンロード（Googleドライブからの取得）
          # ※リンク切れを防ぐため、必ず「ダウンロード可能な直リンク」を使用してください
          wget --user-agent="Mozilla/5.0" --no-check-certificate "$https://github.com/BlackCatLove2222/sample/releases/download/apkm/app.apkm" -O app.apkm
          
          # 3. 実行前のチェック（ファイルが存在し、かつ空ではないか確認）
          if [ ! -s revanced-cli.jar ]; then echo "Error: CLI download failed"; exit 1; fi
          if [ ! -s app.apkm ]; then echo "Error: APK download failed"; exit 1; fi
          
          # 4. パッチ適用とビルド
          unzip -o app.apkm -d temp_apk
          find temp_apk -name "*.apk" | sort | head -n 1 > base_path.txt
          java -jar revanced-cli.jar -a $(cat base_path.txt) -o patched.apk -b patches.rvp --exclusive
          
          # 5. モジュール作成
          mkdir -p final_module/system/app/Twitter
          cp patched.apk final_module/system/app/Twitter/Twitter.apk
          echo "id=x_revanced_patched" > final_module/module.prop
          echo "name=X Patched (ReVanced)" >> final_module/module.prop
          echo "version=11.72.0" >> final_module/module.prop
          echo "author=GeminiUser" >> final_module/module.prop
          cd final_module && zip -r ../X-Patched-Module.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: Final-Magisk-Module
          path: X-Patched-Module.zip

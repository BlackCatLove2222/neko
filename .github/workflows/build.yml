name: Build X Magisk Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # 【重要】LFSファイルを確実に引き出す

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with ReVanced CLI
        run: |
          # 確実にファイルを探す（見つからない場合はエラーで止める）
          CLI_JAR=$(ls revanced-cli-*.jar | head -n 1)
          APK_FILE=$(ls *.apkm | head -n 1)
          PATCH_FILE=$(ls *.rvp | head -n 1)
          
          echo "Using: $CLI_JAR, $APK_FILE, $PATCH_FILE"
          
          # ファイルの存在確認
          if [ -z "$CLI_JAR" ] || [ -z "$APK_FILE" ]; then
            echo "Error: 必要なファイルがリポジトリに見当たりません。LFSの設定を確認してください。"
            ls -F
            exit 1
          fi
          
          # 実行
          unzip -o "$APK_FILE" -d temp_apk
          java -jar "$CLI_JAR" -a "$(find temp_apk -name "*.apk" | head -n 1)" -o patched.apk -b "$PATCH_FILE" --exclusive
          
          # 以下、モジュール作成
          mkdir -p final_module/system/app/Twitter
          cp patched.apk final_module/system/app/Twitter/Twitter.apk
          echo "id=x_revanced_patched" > final_module/module.prop
          echo "name=X Patched (ReVanced)" >> final_module/module.prop
          echo "version=11.72.0" >> final_module/module.prop
          echo "author=GeminiUser" >> final_module/module.prop
          cd final_module && zip -r ../X-Patched-Module.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: Final-Magisk-Module
          path: X-Patched-Module.zip

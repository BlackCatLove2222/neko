name: Build X Magisk Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android Build Tools
        run: sudo apt-get update && sudo apt-get install -y android-sdk-build-tools

      - - name: Build with ReVanced CLI
        run: |
          [ -f settings.env ] && source settings.env
          
          # 1. APIに頼らず、直接固定URLでダウンロードする (最新版)
          # curlでリダイレクトを追跡(-L)し、確実にファイルを取得
          curl -L "https://github.com/ReVanced/revanced-cli/releases/latest/download/revanced-cli-all.jar" -o revanced-cli.jar
          curl -L "https://github.com/ReVanced/revanced-patches/releases/latest/download/revanced-patches.rvp" -o patches.rvp
          
          # ダウンロード確認 (ファイルが小さすぎる場合はHTMLを落としている可能性が高い)
          ls -lh revanced-cli.jar patches.rvp
          
          # 2. APKのダウンロード
          wget --user-agent="Mozilla/5.0" "$APK_URL" -O app.apkm
          
          # 3. 解凍とパッチ適用... (以下省略)

      - uses: actions/upload-artifact@v4
        with:
          name: Final-Magisk-Module
          path: X-Patched-Module.zip

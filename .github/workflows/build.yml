name: Build X Magisk Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android Build Tools
        run: sudo apt-get update && sudo apt-get install -y android-sdk-build-tools

      - name: Build with ReVanced CLI
        run: |
          # 1. 提供された一時リンクを直接使用
          APK_URL="https://drive.usercontent.google.com/download?id=1sp5-_6hoRAMwpezb30HCulxBY6Qwq3WD&export=download&authuser=0&confirm=t&uuid=5401e639-b3bf-409b-bf74-bb4a173f2a56&at=AGN2oQ2zaJWyX28O4b6AAa9Nj-Pl:1773212599838"
          
          # 2. CLIとパッチの取得
          curl -L -o revanced-cli.jar "https://github.com/ReVanced/revanced-cli/releases/latest/download/revanced-cli-all.jar"
          curl -L -o patches.rvp "https://github.com/ReVanced/revanced-patches/releases/latest/download/revanced-patches.rvp"
          
          # 3. APKのダウンロード
          wget --user-agent="Mozilla/5.0" --no-check-certificate "$APK_URL" -O app.apkm
          
          # 4. ファイルサイズチェック（10MB以上あるか）
          ls -lh app.apkm
          if [ $(stat -c%s "app.apkm") -lt 10000000 ]; then 
            echo "Error: Downloaded file is too small. Please refresh the URL."
            exit 1
          fi
          
          # 5. パッチ処理（CLIの引数を適切に設定）
          java -jar revanced-cli.jar -a app.apkm -o patched.apk -b patches.rvp --exclusive
          
          # 6. モジュール作成
          mkdir -p final_module/system/app/Twitter
          cp patched.apk final_module/system/app/Twitter/Twitter.apk
          echo "id=x_revanced_patched" > final_module/module.prop
          echo "name=X Patched (ReVanced)" >> final_module/module.prop
          echo "version=11.72.0" >> final_module/module.prop
          echo "author=GeminiUser" >> final_module/module.prop
          cd final_module && zip -r ../X-Patched-Module.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: Final-Magisk-Module
          path: X-Patched-Module.zip

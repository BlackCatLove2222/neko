name: Build X Magisk Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - - name: Build with ReVanced CLI
        run: |
          # 1. GitHub APIを使用して最新のCLIのダウンロードURLを取得してダウンロード
          CLI_URL=$(curl -s https://api.github.com/repos/ReVanced/revanced-cli/releases/latest | grep "browser_download_url.*\.jar" | cut -d '"' -f 4)
          wget "$CLI_URL" -O revanced-cli.jar
          
          # 2. XAPK (Bundle) をダウンロード（リンクは最新のものに置き換えてください）
          wget "https://www.apkmirror.com/wp-content/themes/apkmirror/download.php?id=853245" -O app.xapk
          
          # 3. XAPKの解凍とベースAPKの抽出
          unzip app.xapk -d temp_apk
          # base.apk が見つからない場合に備えて、サイズが最大のapkを探す
          find temp_apk -name "*.apk" -printf "%s %p\n" | sort -nr | head -n 1 | cut -d' ' -f2- > base_path.txt
          cp $(cat base_path.txt) twitter.apk
          
          # 4. パッチ適用
          java -jar revanced-cli.jar -a twitter.apk -o patched.apk -b patches-2.0.0.rvp --exclusive
          
          # 5. Magiskモジュール構造の作成
          mkdir -p final_module/system/app/Twitter
          cp patched.apk final_module/system/app/Twitter/Twitter.apk
          
          # module.propの作成
          echo "id=x_revanced_patched" > final_module/module.prop
          echo "name=X Patched (ReVanced)" >> final_module/module.prop
          echo "version=11.72.0" >> final_module/module.prop
          echo "author=GeminiUser" >> final_module/module.prop
          echo "description=Automatically patched via GitHub Actions" >> final_module/module.prop
          
          # 6. ZIP圧縮
          cd final_module && zip -r ../X-Patched-Module.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: Final-Magisk-Module
          path: X-Patched-Module.zip

name: Build X Magisk Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with ReVanced CLI
        run: |
          # 1. 必要なファイルを特定
          CLI_JAR=$(ls revanced-cli-*.jar | head -n 1)
          APK_FILE=$(ls *.apkm | head -n 1)

          if [ -z "$CLI_JAR" ] || [ -z "$APK_FILE" ]; then
            echo "Error: revanced-cli-*.jar または *.apkm が見つかりません。"
            exit 1
          fi

          # 2. パッチとインテグレーションをダウンロード（修正: 正しいURLを使用し、破損チェック追加）
          curl -L -o patches.jar "https://github.com/ReVanced/revanced-patches/releases/latest/download/revanced-patches.jar"
          curl -L -o integrations.apk "https://github.com/ReVanced/revanced-integrations/releases/latest/download/revanced-integrations.apk"

          # ファイルサイズチェック（破損を防ぐ: 最小サイズとして100KB以上を想定）
          if [ ! -s patches.jar ] || [ $(stat -c%s patches.jar) -lt 100000 ]; then
            echo "Error: patches.jar のダウンロードに失敗または破損しています。"
            exit 1
          fi
          if [ ! -s integrations.apk ] || [ $(stat -c%s integrations.apk) -lt 100000 ]; then
            echo "Error: integrations.apk のダウンロードに失敗または破損しています。"
            exit 1
          fi

          # 3. APKの解凍とベースAPKの特定
          unzip -o "$APK_FILE" -d temp_apk
          BASE_APK=$(find temp_apk -type f -name "base.apk" | head -n 1)  # base.apkを明示的に指定

          if [ -z "$BASE_APK" ]; then
            echo "Error: base.apk が見つかりません。"
            exit 1
          fi

          # 4. パッチ適用（修正: ReVanced CLIの正しいオプションを使用、integrationsをmerge）
          java -jar "$CLI_JAR" patch \
            --bundle=patches.jar \
            --merge=integrations.apk \
            --out=patched.apk \
            --force \
            "$BASE_APK"

          # 5. Magiskモジュール構成の作成（アプリ名をX/Twitterに合わせて調整可能）
          mkdir -p final_module/system/app/Twitter
          mv patched.apk final_module/system/app/Twitter/Twitter.apk
          echo "id=x_revanced_patched" > final_module/module.prop
          echo "name=X Patched (ReVanced)" >> final_module/module.prop
          echo "version=11.72.0" >> final_module/module.prop
          echo "author=GeminiUser" >> final_module/module.prop

          # 6. ZIP圧縮 (Magiskが認識できる正しい階層構造)
          cd final_module && zip -r ../X-Patched-Module.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: Final-Magisk-Module
          path: X-Patched-Module.zip

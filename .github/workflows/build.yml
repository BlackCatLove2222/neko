name: Build X Magisk Module

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dummy Module
        run: |
          mkdir -p output/system/app/Twitter
          echo "This is a test module" > output/README.txt
          zip -r X-Magisk-Module.zip output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: X-Magisk-Module-Success
          path: X-Magisk-Module.zip

name: Build X Magisk Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with ReVanced CLI
        run: |
          # 1. CLI, パッチ, インテグレーションをダウンロード（固定バージョンURLを使用: 公式/フォークの最新有効リリース）
          curl -L -f -o revanced-cli.jar "https://github.com/ReVanced/revanced-cli/releases/download/v5.0.1/revanced-cli-5.0.1-all.jar" || { echo "Error: revanced-cli.jar ダウンロード失敗"; exit 1; }
          curl -L -f -o patches.jar "https://github.com/anddea/revanced-patches/releases/download/v3.16.0/revanced-patches-3.16.0.jar" || { echo "Error: patches.jar ダウンロード失敗"; exit 1; }
          curl -L -f -o integrations.apk "https://github.com/ReVanced/revanced-integrations/releases/download/v1.16.0/revanced-integrations-1.16.0.apk" || { echo "Error: integrations.apk ダウンロード失敗"; exit 1; }

          # ファイルサイズチェック
          if [ $(stat -c%s revanced-cli.jar) -lt 10000 ]; then
            echo "Error: revanced-cli.jar が破損または空です。"
            exit 1
          fi
          if [ $(stat -c%s patches.jar) -lt 50000 ]; then
            echo "Error: patches.jar が破損または空です。"
            exit 1
          fi
          if [ $(stat -c%s integrations.apk) -lt 50000 ]; then
            echo "Error: integrations.apk が破損または空です。"
            exit 1
          fi

          # 2. APKの特定と解凍
          APK_FILE=$(ls *.apkm | head -n 1)

          if [ -z "$APK_FILE" ]; then
            echo "Error: *.apkm が見つかりません。"
            exit 1
          fi

          unzip -o "$APK_FILE" -d temp_apk
          BASE_APK=$(find temp_apk -type f -name "base.apk" | head -n 1)

          if [ -z "$BASE_APK" ]; then
            echo "Error: base.apk が見つかりません。"
            exit 1
          fi

          # 3. パッチ適用
          java -jar revanced-cli.jar patch \
            --bundle=patches.jar \
            --merge=integrations.apk \
            --out=patched.apk \
            --force \
            "$BASE_APK"

          # 4. Magiskモジュール構成の作成
          mkdir -p final_module/system/app/Twitter
          mv patched.apk final_module/system/app/Twitter/Twitter.apk
          echo "id=x_revanced_patched" > final_module/module.prop
          echo "name=X Patched (ReVanced)" >> final_module/module.prop
          echo "version=11.72.0" >> final_module/module.prop
          echo "author=GeminiUser" >> final_module/module.prop

          # 5. ZIP圧縮
          cd final_module && zip -r ../X-Patched-Module.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: Final-Magisk-Module
          path: X-Patched-Module.zip

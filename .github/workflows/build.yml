name: Build X Magisk Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android Build Tools
        run: sudo apt-get update && sudo apt-get install -y android-sdk-build-tools

      - - name: Build with ReVanced CLI
        run: |
          # 1. 読み込み方を変更
          # ファイルから一行ずつ読み込んで、環境変数として設定します
          export APK_URL=$(grep 'APK_URL=' settings.env | cut -d '=' -f2)
          
          # 2. 確認出力（ログにURLが出るかチェック）
          echo "Debug: APK_URL detected as: $APK_URL"
          
          # 3. 空ならエラー
          if [ -z "$APK_URL" ]; then
            echo "Error: APK_URL variable failed to load."
            exit 1
          fi
          
          # 4. 以降、CLIのダウンロードと処理...

      - uses: actions/upload-artifact@v4
        with:
          name: Final-Magisk-Module
          path: X-Patched-Module.zip

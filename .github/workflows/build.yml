name: Build X Magisk Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with ReVanced CLI
        run: |
          CLI_JAR=$(ls revanced-cli-*.jar 2>/dev/null | head -n 1)
          APK_FILE=$(ls *.apkm 2>/dev/null | head -n 1)
          PATCH_FILE=$(ls *.rvp 2>/dev/null | head -n 1)
          
          echo "Debug: CLI_JAR=$CLI_JAR, APK_FILE=$APK_FILE, PATCH_FILE=$PATCH_FILE"
          if [ -z "$CLI_JAR" ] || [ -z "$APK_FILE" ] || [ -z "$PATCH_FILE" ]; then
            echo "Error: ファイルが見つかりません"
            exit 1
          fi
          
          unzip -o "$APK_FILE" -d temp_apk
          BASE_APK=$(find temp_apk -name "base.apk" | head -n 1)
          java -jar "$CLI_JAR" patch -a "$BASE_APK" -o patched.apk -b "$PATCH_FILE" --exclusive
          
          mkdir -p final_module/system/app/Twitter
          cp patched.apk final_module/system/app/Twitter/Twitter.apk
          echo "id=x_revanced_patched" > final_module/module.prop
          echo "name=X Patched (ReVanced)" >> final_module/module.prop
          echo "version=11.72.0" >> final_module/module.prop
          echo "author=GeminiUser" >> final_module/module.prop
          cd final_module && zip -r ../X-Patched-Module.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: Final-Magisk-Module
          path: X-Patched-Module.zip
